name: me_ajuda_aqui
description: Aplicativo assistente de voz para idosos com funcionalidades de fala e reconhecimento de voz.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^3.8.5
  speech_to_text: ^6.6.0
  cupertino_icons: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
